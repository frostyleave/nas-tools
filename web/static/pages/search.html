<div class="container-xl">
  <!-- Page title -->
  <div class="page-header d-print-none d-none d-md-block">
    <div class="row align-items-center">
      <div class="col">
        <h2 class="page-title text-nowrap">资源搜索</h2>
        <div class="text-muted mt-1" id="search-count"></div>
      </div>
    </div>
  </div>
</div>

<!-- 搜索结果 -->
<div class="page-body">
  <div class="container-xl">
    <div class="d-grid gap-3" id="media_cards"></div>
  </div>
</div>

<!-- 空结果 -->
<div id="empty_result" style="display:none;">
  <empty-content title="没有搜索结果" text="输入想看的电影、电视剧名称，点击搜索试试看吧。"></empty-content>
</div>

<!-- 弹窗容器（每个条目的过滤弹窗将注入到这里） -->
<div id="filter_modals"></div>

<script type="text/javascript">

  // ↑ 符号
  const char_up = "↑";

  $(document).ready(function () {
    axios.post("/data/search", {})
      .then(function (response) {
        const data = response.data || {};
        renderSearchResults(data);
      })
      .catch(function (error) {
        console.error(error);
        $("#search-count").text("加载失败");
      });
  });

  function renderSearchResults(data) {
    const cardsContainer = $("#media_cards");
    const modalsContainer = $("#filter_modals");
    cardsContainer.empty();
    modalsContainer.empty();

    if (!data || !data.Results || data.Count === 0 || Object.keys(data.Results).length === 0) {
      $("#search-count").text("没有搜索结果");
      $("#empty_result").show();
      return;
    }

    $("#search-count").text(`共搜索到 ${data.Count} 条记录`);
    $("#empty_result").hide();

    Object.entries(data.Results).forEach(([title, item]) => {
      // 卡片
      const cardHtml = renderCard(title, item);
      cardsContainer.append(cardHtml);

      // 弹窗
      const modalHtml = renderFilterModal(title, item);
      modalsContainer.append(modalHtml);
    });
  }

  /* 渲染卡片（完整保留原布局结构） */
  function renderCard(title, item) {
    const tmdbLink = (item.tmdbid && item.tmdbid !== "0")
      ? (item.type === "电影"
          ? `https://www.themoviedb.org/movie/${item.tmdbid}`
          : `https://www.themoviedb.org/tv/${item.tmdbid}`)
      : "";

    return `
      <div class="card bg-transparent border-0">
        <div class="ribbon g-cyan d-md-none">
          <a class="text-white" href="javascript:show_search_filter_modal('${item.key}')">
            <i class="ti ti-filter fs-2"></i>
          </a>
        </div>
        ${item.fav === "2" ? `
        <div class="badge badge-pill bg-green d-md-none" style="position:absolute;top:20px;right:50px;padding:0;">
          <i class="ti ti-check fs-2"></i>
        </div>` : ""}
        <div class="card-body ps-1 pe-1">
          <div class="row">
            <!-- 左侧过滤条件（桌面显示） -->
            <div class="col-2 ps-3 d-none d-md-block" id="search_results_filter_${item.key}" style="max-width: 15rem">
              ${renderPoster(item)}
              ${renderFilters(item, item.key, false)}
              <div class="mt-3">
                <button class="btn w-100" onclick="reset_filter(this, '${item.key}')">
                  重置
                </button>
              </div>
            </div>
            <!-- 右侧内容 -->
            <div class="col">
              <!-- 标题 -->
              <div class="row">
                <div class="col">
                  <h2 class="mb-0">
                    <strong>${escapeHtml(title)}</strong>
                  </h2>
                </div>
              </div>

              <!-- 媒体属性（移动端显示） -->
              <div class="row mt-2 d-md-none">
                <div class="col-md">
                  ${(item.tmdbid && item.tmdbid !== "0") ? `
                  <div class="list-inline list-inline-dots mb-0 text-muted">
                    <div class="list-inline-item">
                      <i class="ti ti-video"></i>
                      ${escapeHtml(item.type || "")}
                    </div>
                    <div class="list-inline-item">
                      <i class="ti ti-star"></i>
                      ${item.vote ? escapeHtml(String(item.vote)) : "暂无评分"}
                    </div>
                    <div class="list-inline-item">
                      <i class="ti ti-info-circle"></i>
                      <a href="${tmdbLink}" target="_blank">${escapeHtml(String(item.tmdbid))}</a>
                    </div>
                  </div>` : ""}
                </div>
              </div>

              <!-- 简介（桌面显示） -->
              ${item.overview ? `<div class="text-muted mt-2 d-none d-md-block">${escapeHtml(item.overview)}</div>` : ""}

              <!-- 资源分组 -->
              ${renderTorrentGroups(item)}
            </div>
          </div>
        </div>
      </div>
    `;
  }

  /* 渲染海报卡片 */
  function renderPoster(item) {
    if (!item.poster) return "";
    return `
      <normal-card
        card-tmdbId="${escapeAttr(item.tmdbid)}"
        card-mediatype="${escapeAttr(item.type)}"
        card-showSub="1"
        card-image="${escapeAttr(item.poster)}"
        card-fav="${escapeAttr(item.fav)}"
        card-vote="${escapeAttr(item.vote)}"
        card-year="${escapeAttr(item.year)}"
        card-title="${escapeAttr(item.title)}"
        card-overview="${escapeAttr(item.overview || "")}"
        card-restype="${escapeAttr(item.type)}"
      ></normal-card>
    `;
  }

  /* 渲染过滤条件 */
  function renderFilters(item, key, modal) {
    if (!item.filter) return "";
    let html = "";

    const addFilterGroup = (label, name, values, extraSpanClass) => {
      if (!values || !values.length) return "";
      let group = `<div class="subheader mb-2 mt-2">${label}</div><div class="form-selectgroup form-selectgroup-pills">`;
      values.forEach(v => {
        const val = typeof v === "object" ? v.value : v;
        const txt = typeof v === "object" ? v.name : v;
        group += `
          <label class="form-selectgroup-item">
            <input type="checkbox" name="${name}" value="${escapeAttr(val)}" class="form-selectgroup-input"
              onclick="filter_medias(this, '${key}', ${modal ? "true" : "false"})">
            <span class="form-selectgroup-label ${extraSpanClass || ""}">${escapeHtml(String(txt))}</span>
          </label>`;
      });
      group += `</div>`;
      return group;
    };

    html += item.filter.season ? addFilterGroup("季", "filter_season", item.filter.season) : "";
    html += item.filter.site ? addFilterGroup("站点", "filter_site", item.filter.site) : "";
    html += item.filter.releasegroup ? addFilterGroup("制作组", "filter_releasegroup", item.filter.releasegroup, "filter_releasegroup_span") : "";
    html += item.filter.free ? addFilterGroup("促销", "filter_free", item.filter.free) : "";
    html += item.filter.video ? addFilterGroup("视频编码", "filter_video", item.filter.video) : "";

    return html;
  }

  /* 渲染分组与折叠面板 */
  function renderTorrentGroups(item) {
    if (!item.torrent_dict) return "";
    let html = "";

    Object.entries(item.torrent_dict).forEach(([seKey, seDict]) => {
      const seKeyNoSpace = String(seKey).replace(/ /g, "");
      // 剧季折叠切换（非 MOV）
      if (seKey !== "MOV") {
        html += `
          <a href="javascript:$('#search_se_accordion_${seKeyNoSpace}_${item.key}').slideToggle()"
            class="search_results_season_${item.key}"
            data-season="${escapeAttr(seKey)}">
            <div class="row mt-2">
              <h3 class="mb-0"><strong>${escapeHtml(seKey)}</strong></h3>
            </div>
          </a>`;
      }

      html += `<div ${seKey !== "MOV" ? `id="search_se_accordion_${seKeyNoSpace}_${item.key}"` : ""}>`;
      html += `<div class="accordion mt-2" id="search_results_accordion_${item.key}">`;

      let idx = 0;
      Object.entries(seDict).forEach(([groupKey, group]) => {
        const expanded = idx === 0;
        html += `
          <div class="accordion-item" id="search_results_accordion_item_${escapeAttr(groupKey)}_${item.key}_${seKeyNoSpace}">
            <h2 class="accordion-header">
              <button class="accordion-button p-2 ${expanded ? "" : "collapsed"}"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#search_results_group_${escapeAttr(groupKey)}_${item.key}_${seKeyNoSpace}"
                aria-expanded="${expanded ? "true" : "false"}">
                <span class="text-red">${escapeHtml(group?.group_info?.restype || "其他")}</span>
                  &nbsp;/&nbsp;
                <span class="text-orange">${escapeHtml(group?.group_info?.respix || "未知分辨率")}</span>
                  &nbsp;/&nbsp;
                <span class="text">共
                  <span id="search_results_group_total_${escapeAttr(groupKey)}_${item.key}_${seKeyNoSpace}"
                        class="search_results_group_total"
                        data-total="${escapeAttr(group?.group_total ?? 0)}">${escapeHtml(String(group?.group_total ?? 0))}</span>
                  个种子
                </span>
              </button>
            </h2>
            <div id="search_results_group_${escapeAttr(groupKey)}_${item.key}_${seKeyNoSpace}"
                class="accordion-collapse collapse ${expanded ? "show" : ""}"
                data-bs-parent="#search_results_accordion_${item.key}">
              <div class="accordion-body p-1">
                <div class="card-list-group mt-1">
                  ${renderTorrentList(group?.group_torrents || {}, item, groupKey, seKeyNoSpace)}
                </div>
              </div>
            </div>
          </div>`;
        idx += 1;
      });

      html += `</div></div>`;
    });

    return html;
  }

  /* 渲染种子列表（含所有徽章与动作） */
  function renderTorrentList(groupTorrents, item, groupKey, seasonKeyNoSpace) {
    let html = "";
    Object.entries(groupTorrents).forEach(([uniqueKey, unique]) => {
      (unique?.torrent_list || []).forEach(torrent => {
        const freeVal = String((torrent.uploadvalue ?? 1)) + " " + String((torrent.downloadvalue ?? 1));
        html += `
          <div class="list-group-item p-1 search_results_torrent"
            data-site="${escapeAttr(torrent.site)}"
            data-releasegroup="${escapeAttr(torrent.releasegroup || "未知")}"
            data-free="${escapeAttr(freeVal)}"
            data-video="${escapeAttr(torrent.video_encode || "")}"
            data-group="${escapeAttr(groupKey)}"
            data-season="${escapeAttr(seasonKeyNoSpace)}">
            <input type="hidden" id="title_${escapeAttr(torrent.id)}" value="${escapeAttr(torrent.torrent_name)}">
            <input type="hidden" id="description_${escapeAttr(torrent.id)}" value="${escapeAttr(torrent.description || "")}">
            <input type="hidden" id="site_${escapeAttr(torrent.id)}" value="${escapeAttr(torrent.site)}">
            <div class="row g-2 align-items-center">
              <div class="col">
                <a href='javascript:download_search_resource("${escapeAttr(torrent.id)}")'>
                  ${escapeHtml(torrent.torrent_name)}
                </a>
                ${(item.tmdbid === "0" || !item.tmdbid) ? `
                <a class="ms-2 mb-1" title="名称测试" href='javascript:nametest("${escapeAttr(torrent.id)}")' data-bs-toggle="tooltip">
                  <i class="ti ti-text-recognition"></i>
                </a>` : ""}
                <div class="mb-1">
                  ${(torrent.labels || []).map(label => `<span class="badge badge-outline text-purple">${escapeHtml(String(label))}</span>`).join("")}
                  <span class="text-muted">${escapeHtml(torrent.description || "")}</span>
                </div>
                <div>
                  ${torrent.site ? `<span class="badge bg-black text-dark-fg mb-1">${escapeHtml(String(torrent.site))}</span>` : ""}
                  ${torrent.video_encode ? `<span class="badge text-white bg-orange mb-1">${escapeHtml(String(torrent.video_encode))}</span>` : ""}
                  ${torrent.reseffect ? `<span class="badge text-white bg-purple mb-1">${escapeHtml(String(torrent.reseffect))}</span>` : ""}
                  ${torrent.size ? `<span class="badge text-white bg-yellow mb-1">${escapeHtml(String(torrent.size))}</span>` : ""}
                  ${torrent.releasegroup ? `<span class="badge text-white bg-cyan mb-1">${escapeHtml(String(torrent.releasegroup))}</span>` : ""}
                  ${(torrent.uploadvalue ?? 1) !== 1 ? `<span class="badge text-white bg-azure mb-1">${Math.round((torrent.uploadvalue || 1) * 100)}%UL</span>` : ""}
                  ${(torrent.downloadvalue ?? 1) !== 1
                    ? ((torrent.downloadvalue || 0) === 0
                      ? `<span class="badge text-white bg-lime mb-1">FREE</span>`
                      : `<span class="badge text-white bg-indigo mb-1">${Math.round((torrent.downloadvalue || 1) * 100)}%DL</span>`)
                    : ""}
                  ${torrent.seeders ? `<span class="badge text-white mb-1">${escapeHtml(String(torrent.seeders))}${char_up}</span>` : ""}
                  ${torrent.pubdate ? `<span class="badge text-white bg-lime mb-1">${escapeHtml(String(torrent.pubdate))}</span>` : ""}
                </div>
                ${(item.tmdbid === "0" || !item.tmdbid) ? `<custom-chips class="mt-1" id="testresults_${escapeAttr(torrent.id)}"></custom-chips>` : ""}
              </div>
              <div class="col-auto ms-2 d-none d-md-inline-block">
                <a href='javascript:download_search_resource("${escapeAttr(torrent.id)}")' class="link-secondary" title="下载">
                  <i class="ti ti-download fs-2"></i>
                </a>
              </div>
              <div class="col-auto lh-1 ms-2 d-none d-md-inline-block">
                <div class="dropdown">
                  <a href="#" class="link-secondary" data-bs-toggle="dropdown" aria-expanded="false">
                    <i class="ti ti-dots fs-2"></i>
                  </a>
                  <div class="dropdown-menu dropdown-menu-end" style="">
                    ${torrent.enclosure && /^https?:\/\//.test(String(torrent.enclosure)) ? `
                    <a class="dropdown-item" href="${escapeAttr(torrent.enclosure)}" target="_blank">
                      下载种子文件
                    </a>` : ""}
                    <a class="dropdown-item" href="${escapeAttr(torrent.pageurl || "#")}" target="_blank">
                      查看种子详情
                    </a>
                  </div>
                </div>
              </div>
            </div>
          </div>
        `;
      });
    });
    return html;
  }

  /* 过滤/统计逻辑 —— 完整保留原有接口与行为 */
  function sub_group_total(group, key, se) {
    let total_obj = $(`#search_results_group_total_${group}_${key}_${se}`)
    let current_num = parseInt(total_obj.text());
    if (current_num < 1) {
      current_num = 1;
    }
    total_obj.text(current_num-1);
    if (current_num===1) {
      $(`#search_results_accordion_item_${group}_${key}_${se}`).hide();
    }
  }

  function filter_do(key, modal) {
    let filter_obj;
    if (modal) {
      filter_obj = `#search_results_filter_${key}_modal`;
    } else {
      filter_obj = `#search_results_filter_${key}`;
    }
    let torrent_obj = `#search_results_accordion_${key}`;
    let season_obj = `.search_results_season_${key}`;
    // 全部显示
    $(`${torrent_obj} .accordion-item`).each(function () {
      $(this).show();
    });
    $(`${torrent_obj} .search_results_torrent`).each(function () {
      $(this).show();
    });
    $(season_obj).each(function () {
      $(this).show();
    });
    // 恢复总条数
    $(`${torrent_obj} .search_results_group_total`).each(function () {
      $(this).text($(this).attr("data-total"));
    });
    // 过滤条件
    let filter_site = select_GetSelectedVAL("filter_site")[0];
    let filter_releasegroup = select_GetSelectedVAL("filter_releasegroup")[0];
    let filter_free = select_GetSelectedVAL("filter_free")[0];
    let filter_video = select_GetSelectedVAL("filter_video")[0];
    let filter_season = select_GetSelectedVAL("filter_season")[0];
    // 展开/收起
    if (filter_site || filter_free || filter_video || filter_releasegroup) {
      $(`${torrent_obj} .accordion-button`).each(function () {
        $(this).removeClass("collapsed");
      });
      $(`${torrent_obj} .accordion-collapse`).each(function () {
        $(this).addClass("show");
      });
    } else {
      $(`${torrent_obj} .accordion-button`).each(function () {
        $(this).addClass("collapsed");
      });
      $(`${torrent_obj} .accordion-collapse`).each(function () {
        $(this).removeClass("show");
      });
    }
    // 执行过滤
    if (filter_site) {
      $(`${torrent_obj} .search_results_torrent`).each(function () {
        if ($(this).attr("data-site") !== filter_site) {
          if($(this).is(":visible")){
            sub_group_total($(this).attr("data-group"), key, $(this).attr("data-season"));
            $(this).hide();
          }
        }
      });
    }
    if (filter_releasegroup) {
      $(`${torrent_obj} .search_results_torrent`).each(function () {
        if ($(this).attr("data-releasegroup") !== filter_releasegroup) {
          if($(this).is(":visible")){
            sub_group_total($(this).attr("data-group"), key, $(this).attr("data-season"));
            $(this).hide();
          }
        }
      });
    }
    if (filter_free) {
      $(`${torrent_obj} .search_results_torrent`).each(function () {
        if ($(this).attr("data-free") !== filter_free) {
          if($(this).is(":visible")){
            $(this).hide();
            sub_group_total($(this).attr("data-group"), key, $(this).attr("data-season"));
          }
        }
      });
    }
    if (filter_video) {
      $(`${torrent_obj} .search_results_torrent`).each(function () {
        if ($(this).attr("data-video") !== filter_video) {
          if($(this).is(":visible")) {
            $(this).hide();
            sub_group_total($(this).attr("data-group"), key, $(this).attr("data-season"));
          }
        }
      });
    }
    if (filter_season) {
      $(season_obj).each(function () {
        let season = $(this).attr("data-season").split(" ")[0];
        let se_key = $(this).attr("data-season").replace(" ", "");
        if ( season !== filter_season) {
          $(this).hide();
          $(`#search_se_accordion_${se_key}_${key}`).hide();
        }else{
          $(this).show();
          $(`#search_se_accordion_${se_key}_${key}`).show();
        }
      });
    }
  }

  function filter_medias(obj, key, modal) {
    check_selectgroup_raido(obj);
    filter_do(key, modal);
  }

  function filter_reset() {
    select_SelectALL(false, "filter_site");
    select_SelectALL(false, "filter_free");
    select_SelectALL(false, "filter_video");
    select_SelectALL(false, "filter_season");
    select_SelectALL(false, "filter_releasegroup");
  }

  function reset_filter(obj, key, modal) {
    filter_reset();
    filter_do(key, modal);
  }

  function show_search_filter_modal(key) {
    $(`#search-filter-modal-${key}`).modal("show");
  }

  function download_search_resource(id) {
    const title = $(`#title_${id}`).val();
    const site = $(`#site_${id}`).val();
    show_download_modal(id, `【${site}】${title}`, site);
  }

  function nametest(id) {
    let title = $(`#title_${id}`).val();
    let subtitle = $(`#description_${id}`).val();
    media_name_test(title, `testresults_${id}`, function () {}, subtitle);
  }

  // 简单的 HTML 转义，避免 XSS
  function escapeHtml(str) {
    if (str === null || str === undefined) return "";
    return String(str)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }

  function escapeAttr(str) {
    return escapeHtml(str).replace(/`/g, "&#96;");
  }

</script>
