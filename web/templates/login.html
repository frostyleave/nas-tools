<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="icon" type="image/png" href="/static/img/logo/logo.png">
  <link rel="shortcut icon" href="/static/favicon.ico" type="image/x-icon">

  <title>登录 - NAStool</title>
  <!-- CSS files -->
  <link rel="stylesheet" href="/static/css/tabler.min.css" />
  <link rel="stylesheet" href="/static/css/style.css" />
  <link rel="stylesheet" href="/static/tabler/3.34.1/tabler-icons.min.css" />

  <style>
    .login_background {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      overflow: hidden;
      background-image: url(data:image/jpg;base64,{{ image_code|safe }});
      background-size: cover;
      background-position: center;
      background-repeat: repeat;
    }

    .login_window {
      background-color: rgba(255, 255, 255, 0.5);
      -webkit-backdrop-filter: blur(1rem);
      backdrop-filter: blur(1rem)
    }

    .image-desc {
      background-color: rgba(34, 34, 34, .8);
      position: absolute;
      bottom: 20px;
      left: 20px;
      padding: 5px;
      z-index: 10;
      cursor: pointer;
      margin-bottom: env(safe-area-inset-bottom) !important;
      margin-left: env(safe-area-inset-left) !important;
    }

    .image-link,
    .image-link:hover {
      text-decoration: none;
      color: #fff;
    }

    .login_title {
      text-align: center;
      margin: 1.5rem 0;
    }

    h1.login_title>img {
      vertical-align: bottom;
    }

    h1.login_title>label {
      font-size: xx-large;
      color: white;
      text-shadow: 1px 1px 1px rgba(0, 0, 0, 0.5);
    }
  </style>
</head>

<body class="d-flex flex-column login_background">
  {% if image_code and img_title %}
  <div class="image-desc card card-md border-0 rounded-3">
    <a class="image-link" href="{{ img_link }}" target="_blank">
      <i class="ti ti-link"></i>
      {{ img_title }}
    </a>
  </div>
  {% endif %}
  <div class="page page-center">
    <div class="container-tight py-4">
      <form id="loginForm" class="card card-md border-0 {% if image_code %}login_window{% endif %}" autocomplete="off">
        <input type="hidden" name="next" value="{{ GoPage }}" />
        <div class="card-body">
          <div class="text-center mb-3">
            <h1 class="login_title">
              <img src="/static/favicon.ico">
              <label>nastool</label>
            </h1>
          </div>
          <label class="form-label">用户名</label>
          <div class="input-icon mb-3">
            <span class="input-icon-addon">
              <i class="ti ti-user"></i>
            </span>
            <input type="text" name="username" class="form-control {% if err_msg %}is-invalid{% endif %}"
              placeholder="admin" value="" autocomplete="off">
          </div>
          <label class="form-label">密码</label>
          <div class="input-icon">
            <span class="input-icon-addon">
              <i class="ti ti-keyboard"></i>
            </span>
            <input type="password" class="form-control {% if err_msg %}is-invalid{% endif %}" name="password"
              placeholder="password" autocomplete="off">
          </div>
          <!-- <div class="invalid-feedback mb-3" id="login_retmsg" style="display:block">{{ err_msg }}</div>
          <div class="mb-3">
            <label class="form-check">
              <input type="checkbox" name="remember" class="form-check-input" checked />
              <span class="form-check-label">保持登录</span>
            </label>
          </div> -->
          <div class="form-footer">
            <button type="submit" class="btn btn-primary w-100">登录</button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <script src="/static/js/jquery-3.3.1.min.js"></script>
  <script src="/static/js/axios.min.js"></script>
  <script src="/static/js/axios-wrapper.js"></script>
  <script src="/static/js/tabler/tabler.min.js"></script>
  <script src="/static/js/tabler/demo.min.js"></script>
  <script>

    // 全局登录函数
    function performLogin() {

      const username = $('input[name="username"]').val();
      const password = $('input[name="password"]').val();
      const remember = $('input[name="remember"]').is(':checked');

      if (!username || !password) {
        showError('请输入用户名和密码');
        return;
      }

      // 显示加载状态
      const submitBtn = $('button[type="button"]');
      const originalText = submitBtn.text();
      submitBtn.prop('disabled', true).text('登录中...');

      // 调用登录API
      axios_client.post("/auth/token",
      new URLSearchParams({
        username,
        password,
      }),
      {
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
      }).then(function (response) {
          // 恢复按钮状态
          submitBtn.prop('disabled', false).text(originalText);

          if (response.status === 200) {

            // 重定向到目标页面
            const nextPage = '{{ GoPage }}' || 'index';
            const savedHash = sessionStorage.getItem('loginRedirectHash');

            // 使用延迟跳转，确保认证状态完全设置
            setTimeout(() => {
              if (savedHash && savedHash !== '#') {
                // 优先使用保存的hash路由
                sessionStorage.removeItem('loginRedirectHash');
                window.location.href = `/web${savedHash}`;
              } else if (nextPage && nextPage !== 'index' && nextPage !== 'web') {
                window.location.href = `/web#${nextPage}`;
              } else {
                window.location.href = '/web#index';
              }
            }, 100);
          } else {
            showError(data.message || '登录失败');
          }
        })
        .catch(function (error) {
          console.error('Login error:', error);
          if (error.response && error.response.data) {
            showError(error.response.data.message || '登录失败');
          } else {
            showError('网络错误，请重试');
          }
          // 恢复按钮状态
          submitBtn.prop('disabled', false).text(originalText);
        });
    }

    function showError(message) {
      const errorDiv = $('#login_retmsg');
      errorDiv.text(message).show();
      $('input').addClass('is-invalid');
    }


    // 登录处理
    $(document).ready(function () {

      // 保存原始的hash路由（如果有的话）
      const originalHash = window.location.hash;
      if (originalHash && originalHash !== '#') {
        // 将hash保存到sessionStorage，以便登录后恢复
        sessionStorage.setItem('loginRedirectHash', originalHash);
      }

      // 处理回车键登录
      $('input[name="password"]').on('keypress', function (e) {
        if (e.which === 13) { // Enter键
          performLogin();
        }
      });

      // 绑定表单提交事件
      $('#loginForm').on('submit', function (e) {
        e.preventDefault(); // 阻止默认表单提交
        performLogin();
      });

    });

  </script>
</body>

</html>
